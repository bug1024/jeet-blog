##########################################
# Site Settings

baseURL = "https://bug1024.com/"
title = "Bug1024"
languageCode = "zh-cn"
hasCJKLanguage = true
timeZone = "Asia/Shanghai"
copyright = "© 2026 Bug1024"

theme = "meme"

defaultContentLanguage = "zh-cn"
defaultContentLanguageInSubdir = false

titleCaseStyle = "none"
pluralizeListTitles = false
summaryLength = 70
enableEmoji = false
footnoteReturnLinkContents = "↩"
enableRobotsTXT = true

# 文章统一使用稳定、无日期的 URL
[permalinks.page]
    posts = "/posts/:slug/"
[permalinks]
    tags = "/tags/:slug/"

[taxonomies]
    tag = "tags"

[frontmatter]
    lastmod = ["lastmod", ":git", ":fileModTime", ":default"]

[pagination]
    pagerSize = 10
    path = 'page'

[markup]
    [markup.goldmark]
        [markup.goldmark.extensions]
            definitionList = true
            footnote = true
            linkify = true
            strikethrough = true
            table = true
            taskList = true
            typographer = true
        [markup.goldmark.parser]
            attribute = true
            autoHeadingID = true
            autoHeadingIDType = "github"
        [markup.goldmark.renderer]
            hardWraps = false
            unsafe = true
            xHTML = false
    [markup.highlight]
        codeFences = true
        guessSyntax = false
        lineNos = true
        lineNumbersInTable = true
        noClasses = false
    [markup.tableOfContents]
        startLevel = 2
        endLevel = 6
        ordered = true

[minify.tdewolff.html]
    keepWhitespace = false

[related]
    threshold = 80
    includeNewer = true
    toLower = true
    [[related.indices]]
        name = "tags"
        weight = 95
    [[related.indices]]
        name = "date"
        weight = 10
        pattern = "2006"

# Feed 与搜索索引
[mediaTypes."application/atom+xml"]
    suffixes = ["xml"]

[outputFormats.SectionsAtom]
    mediaType = "application/atom+xml"
    baseName = "atom"

[outputFormats.SectionsRSS]
    mediaType = "application/rss+xml"
    baseName = "rss"

[outputFormats.SearchIndex]
    mediaType = "application/json"
    baseName = "search"

[outputs]
    page = ["HTML"]
    home = ["HTML", "RSS", "SectionsAtom", "SectionsRSS", "SearchIndex"]
    section = ["HTML"]
    taxonomy = ["HTML"]
    term = ["HTML"]

[services.rss]
    limit = -1

##########################################
# Menu Settings

[menu]
    [[menu.main]]
        pageref = "/posts/"
        name = "文章"
        weight = 1
        pre = "internal"
        post = "archive"
    [[menu.main]]
        pageref = "/topics/"
        name = "专题"
        weight = 2
        pre = "internal"
        post = "archive"
    [[menu.main]]
        pageref = "/tags/"
        name = "标签"
        weight = 3
        pre = "internal"
        post = "tags"
    [[menu.main]]
        pageref = "/about/"
        name = "关于"
        weight = 4
        pre = "internal"
        post = "user-circle"
    [[menu.main]]
        weight = 5
        identifier = "theme-switcher"
    [[menu.main]]
        weight = 6
        identifier = "search"
        post = "search"

##########################################
# Theme Settings

[params]
    # Header
    enableHeader = true
    displayHeaderInHome = true
    headerBackground = "none"
    headerLayout = "flex"
    enableNavToggle = true
    siteBrandSVG = false
    siteBrandSVGWidth = 250
    siteBrandSVGHeight = 100
    siteBrandSVGFill = "#fff"
    siteBrandFontSize = 1.2
    siteBrandFontColor = "var(--color-contrast-high)"
    homeLinksPadding = 1
    fofPoster = ""

    # Menu Bar
    enableMenu = true
    displayMenuInHome = true

    # Homepage
    homeLayout = "posts"
    enableHideInHomepage = true

    # Site Info
    siteLogo = "/icons/web-app-manifest-512x512.png"
    siteDescription = "工作中的系统与人，生活里的选择与时间，偶尔也谈技术。"
    siteCreatedTime = "2016-12-12T00:00:00+08:00"

    # Brand metadata for search engines and social sharing
    jsonLD = true
    openGraph = true
    twitterCards = true

    # Category（不用 categories，只保留 tags）
    categoryBy = "sections"

    # Tags Page
    enableTagCloud = true
    fontUnit = "em"
    largestFontSize = 2
    smallestFontSize = 1

    # List Page
    listWidth = 36
    displayListTitle = true
    listDateFormat = "1月2日"
    listDatePosition = "right"
    groupByMonth = false
    chineseZodiac = false
    i18nYear = true
    i18nMonth = false

    displayTaxonomyTermCount = true

    mainSections = ["posts"]

    # Atom & RSS（全文输出）
    includeContent = true

    # Dark Mode
    enableDarkMode = true
    defaultTheme = "light"
    hideThemeToggle = false
    overrideSystemPreferences = false

    # Comments（giscus，点击加载）
    enableComments = true
    autoLoadComments = false
    enableGiscus = true
    giscusRepo = "bug1024/jeet-blog"
    giscusRepoId = "MDEwOlJlcG9zaXRvcnk4MzI5MzE0Mw=="
    giscusCategory = "Announcements"
    giscusCategoryId = "DIC_kwDOBPbz184DBaKE"
    giscusMapping = "pathname"
    giscusStrict = false
    giscusReactionsEnabled = true
    giscusEmitMetaData = false
    giscusInputPosition = "bottom"
    giscusTheme = "light"
    giscusThemeDark = "dark"
    giscusLang = "zh-CN"
