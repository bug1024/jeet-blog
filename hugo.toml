baseURL = "https://bug1024.com/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
hasCJKLanguage = true
timeZone = "Asia/Shanghai"
theme = "terminal"
pagination.pagerSize = 10
enableRobotsTXT = true
summaryLength = 90

[outputs]
home = ["HTML", "RSS"]

[permalinks.page]
posts = "/:year/:month/:day/:slug/"

[taxonomies]
tag = "tags"

[markup.goldmark.renderer]
unsafe = true

[params]
contentTypeName = "posts"
showMenuItems = 3
centerTheme = true
fullWidthTheme = false

[languages]
  [languages.zh]
    title = "Bug1024"
    copyright = "© 2026 Bug1024"
    [languages.zh.params]
      subtitle = "十年后端，现在 All in AI。写 AI 工程实践、平台架构与工程师成长。"
      keywords = "AI,LLM,Agent,后端,架构,工程师成长"
      menuMore = "更多"
      readMore = "阅读全文"
      readOtherPosts = "其他文章"
      newerPosts = "较新的文章"
      olderPosts = "较早的文章"
      missingContentMessage = "页面不存在……"
      missingBackButtonLabel = "回到首页"
      [languages.zh.params.logo]
        logoText = "Bug1024"
        logoHomeLink = "/"
    [languages.zh.menu]
      [[languages.zh.menu.main]]
        identifier = "posts"
        name = "文章"
        url = "/posts/"
      [[languages.zh.menu.main]]
        identifier = "tags"
        name = "标签"
        url = "/tags/"
      [[languages.zh.menu.main]]
        identifier = "about"
        name = "关于"
        url = "/about/"
