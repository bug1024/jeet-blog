      - "这些文章来自不同时期留下的学习笔记、项目记录和工作复盘。它们按经历的先后关系重新编排，记录关注点怎样从完成具体任务，逐渐扩展到系统、业务、协作和团队责任。"
      - "这不是一套职业方法论。处在不同阶段的人，可以从与自己当前问题最接近的部分开始读。"
