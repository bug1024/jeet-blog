  Steel-blue role: the fork itself — one muted steel-blue hinge at that single joint physically enables and supports the new branch; it is causal, not a loose prop, and occupies under 8% of the frame.
  Primary request: show a human hand quietly fastening one new paper module to the forked structure, with old notes feeding the original straight path. A practical desk lamp and the faint edge of an out-of-focus monitor may imply a two-o'clock working session, but no screen content is visible.
  Style/medium: constructed editorial still-life between real photography and a carefully handmade editorial model; tactile paper, cardboard, graphite, dark wood, and one brushed steel-blue hinge; believable handling marks and imperfect edges, not glossy 3D.
  Composition/framing: oblique top-down 4:3 composition, one readable path-to-fork relationship, human hand secondary, purposeful breathing room, all important elements inside the outer 6%, clear at thumbnail size.
  Lighting/mood: one ordinary warm task lamp against ink-dark surroundings, quiet renewed concentration, restrained and observant, not cinematic or sentimental.
  Color palette: ink #111A21, paper #F8FAF9, mist #EEF2F3, muted natural paper and wood; steel blue #365B6D only at the fork.
  Constraints: no words, letters, numbers, logo, title, watermark, readable handwriting, UI, extra blue objects, extra branches, broken pieces, or second anomaly.
