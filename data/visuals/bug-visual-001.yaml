  Use case: stylized-concept
  Asset type: BUG1024 article cover, 4:3 landscape
  Article premise: After six years away, the author used AI to rebuild a long-running personal blog, reorganize years of notes, and recover the pleasure of making things late at night.
  Natural order: a disciplined horizontal sequence of worn paper sheets and small folded paper modules forms one clear linear working path across an ink-dark table.
