prompt: |
  Create a 4:3 horizontal constructed editorial still-life for the BUG1024 “The 1024th Cell” visual series. Theme: a good technical compromise does not force every business rule into one elegant abstraction; it makes one bounded exception explicit and maintainable.

  Scene: on a dark ink-colored work surface, a warm off-white plaster calibration panel contains four evenly spaced identical circular sockets in one calm horizontal row. Three sockets hold matching neutral graphite cylinders with a precise, natural fit. The fourth must hold one irregular hand-cut wooden component whose shape is useful but cannot fit the standard socket on its own.

  Introduce exactly one deliberate Patch: a single restrained steel-blue #365B6D adapter collar sits inside that fourth socket and physically holds the irregular wooden component securely without changing the other three sockets. The adapted socket is the only deviation from the repeated system. The blue collar must look functional and removable, not decorative; no other blue elements.

  Style and mood: tactile architectural still-life between real photography and a carefully handmade editorial model; plaster dust, graphite, imperfect wood grain, brushed metal, subtle handling marks. Quiet, intelligent, pragmatic, and restrained, like a Japanese design magazine. Purposeful breathing room and one immediately readable fit-versus-exception relationship.

  Hard constraints: no UI, no configuration screens, no code, no gears, no people, no servers, no robots, no cyberpunk, no text, no letters, no numbers, no logo, no watermark, no decorative grid overlay. Exactly one patched exception and less than 10% steel blue. Keep all meaningful elements inside a 6% safe margin for responsive cropping.
