prompt: |
  Create a 4:3 horizontal constructed editorial still-life for the BUG1024 “The 1024th Cell” visual series. Theme: valuable technical work is often difficult to see because its result is that failure does not happen.

  Scene: a thin warm-gray stone shelf spans the frame against an ink-dark wall. Five identical clear glass vessels stand evenly spaced on the shelf, each filled to the same quiet level with transparent water. Their alignment and still water establish a calm natural order: from above, everything appears ordinary and uneventful.

  Introduce exactly one Break and one functional response: directly beneath the middle vessel, the underside of the stone shelf has one short hairline fracture. A single restrained steel-blue #365B6D metal bracket grips both sides of that fracture and physically prevents it from opening. The bracket is visible to the viewer but sits below the normal line of sight, making the hidden maintenance legible. No spilled water, no tilted vessel, no second crack, and no other blue elements.

  Style and mood: precise, quiet, materially credible editorial still-life between photography and a handmade model. Clear glass, real water, honed stone, brushed metal, soft side light, restrained contrast. Observant rather than dramatic; the scene should communicate “nothing happened because something was maintained.” Readable at thumbnail size.

  Hard constraints: no people, no UI, no charts, no code, no servers, no tools scattered around, no robots, no cyberpunk, no text, no letters, no numbers, no logo, no watermark, no decorative grid overlay. Exactly one fracture and less than 10% steel blue. Keep all meaningful elements inside a 6% safe margin for responsive cropping.
