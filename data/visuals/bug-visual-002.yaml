prompt: |
  Use case: stylized-concept
  Asset type: BUG1024 article cover, 4:3 landscape
  Article premise: Five short writings from 2010 were recovered years later from an old QQ Space archive; they contain rain, wind, waiting, home, departure, and memory.
  Natural order: exactly five tactile paper leaves arranged in one quiet chronological line on a worn wooden surface beside a rain-softened old window.
  Single Bug: out-of-order — the fifth and final paper leaf appears exactly once, slightly displaced from the line, as if it has been recovered and returned years later.
  Steel-blue role: trace — one small muted steel-blue paper joint connects the displaced fifth leaf back to its proper place in the sequence; it is causal and occupies under 6% of the frame.
  Primary request: construct a restrained still-life where the five paper leaves are clearly countable and the displaced final leaf is discoverable on second glance. The old window, damp courtyard, and fine rain provide quiet environmental context only.
  Style/medium: constructed editorial still-life between real photography and a carefully handmade editorial model; believable aged paper fibers, worn dark wood, old glass, plaster, and one steel-blue paper joint; signs of handling and storage, not staged vintage decoration.
  Composition/framing: oblique top-down 4:3 composition, the five-leaf sequence is the focal relationship, purposeful negative space, all important elements inside the outer 6%, readable at thumbnail size.
  Lighting/mood: soft overcast daylight through old glass, cool quiet atmosphere, observant and unsentimental, no sepia nostalgia and no dramatic darkness.
  Color palette: ink #111A21, paper #F8FAF9, mist #EEF2F3, muted natural wood and plaster; steel blue #365B6D only at the reconnecting joint.
  Constraints: exactly five paper leaves; no writing, words, letters, numbers, logo, title, watermark, archive code, grid overlay, visible fish, circular ripple, torn paper, extra missing object, extra blue item, or second anomaly.
  Avoid: generic lifestyle stock photography, sentimental props, artificial nostalgia, cyberpunk, neon, glossy 3D, miniature cuteness, decorative melancholy, title-card design.
