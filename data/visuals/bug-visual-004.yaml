prompt: |
  Create a 4:3 horizontal editorial still-life illustration for the BUG1024 “The 1024th Cell” visual series. Theme: bookmarking is not learning; stored information becomes knowledge only when it is taken out and used to solve a specific problem.

  Scene: on a dark ink-colored worktable, a quiet wooden card-catalog drawer holds many anonymous worn off-white reference cards in precise natural order. The cards contain no readable writing, only faint blank rules. Beside it is one small old wooden hand plane with a single loose joint that needs a practical repair.

  Introduce exactly one deliberate deviation: one single card has been removed from the archive, folded once as a functional shim, and inserted into the hand plane’s loose joint. One restrained steel-blue #365B6D metal clamp holds that card-shim and the joint firmly together. The card must visibly participate in the repair, not merely rest nearby or carry a decorative paper clip. This extracted and used card is the only anomaly; all other cards remain in the drawer. No other blue elements.

  Composition: the archive occupies the left half, the repaired tool the right half, with the extracted card visibly bridging the two ideas. Calm, intelligent, human, materially real; editorial photography fused with subtle crafted illustration, like a quiet Japanese design magazine. Visible paper fibers, worn wood, modest repair marks, purposeful negative space. Avoid a generic study scene.

  Hard constraints: no books, no laptop, no phone, no screens, no people, no brains, no light bulbs, no servers, no robots, no cyberpunk, no title text, no letters, no numbers, no logos, no watermark, no decorative grid overlay. Exactly one visual exception and less than 10% steel blue. Keep all meaningful elements inside a 6% safe margin for responsive cropping.
