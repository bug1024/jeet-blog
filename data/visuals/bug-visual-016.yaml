  Single Bug: overflow — one token reaches a compact set of nested boundary frames and cannot pass because its real shape extends beyond the simple channel's assumed dimensions.
  Steel-blue role: patch — one restrained steel-blue #365B6D adjustable joint opens exactly one nested frame to accommodate the token without removing the surrounding boundaries.
