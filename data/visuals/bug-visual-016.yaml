prompt: |
  Use case: stylized-concept
  Asset type: BUG1024 article cover, 4:3 landscape
  Article premise: Moving from consumer software to enterprise software revealed complexity created by roles, processes, permissions, time, and organizational differences rather than only traffic volume.
