  Style/medium: tactile constructed editorial still-life, editorial and architectural, not an infographic or smooth 3D render.
  Composition/framing: one clear left-to-right relationship, generous but purposeful space, strong thumbnail readability, meaningful elements within 6% safe margins.
  Lighting/mood: cool natural window light, restrained and analytical without looking clinical.
  Color palette: ink #111A21, mist white #F8FAF9, slate gray, natural wood; steel blue under 10%, only on the functioning joint.
  Constraints: no text, letters, numbers, labels, logo, title, watermark; exactly one overflow; no second misaligned token; no generic grid overlay.
