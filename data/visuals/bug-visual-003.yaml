prompt: |
  Create a 4:3 horizontal editorial still-life illustration for the BUG1024 “The 1024th Cell” visual series. Theme: after several work reviews, the author realizes that value exists beyond the review document.

  Scene: an honest, tactile dark-ink worktable with a restrained warm off-white cast. A neat stack of four annual review folders lies in natural chronological order. The top folder is open and contains many small, anonymous paper fragments and neutral geometric work tokens, suggesting projects, metrics, and technical details without any readable writing. The established order is that every fragment remains contained inside the folder.

  Introduce exactly one deliberate deviation: one single narrow strip leaves the open folder’s boundary and continues to a small, solid outcome block placed just beyond the paper. This boundary-crossing strip is the only anomaly in the composition. Make that strip a restrained steel blue #365B6D, because it is actively connecting written material to a real result; no other blue elements.

  Visual mood: calm, intelligent, human, precise, slightly cinematic but not glossy; editorial photography fused with subtle crafted illustration, comparable to a quiet Japanese design magazine. Visible paper fibers, slight wear, careful composition, generous but purposeful negative space. The scene should feel designed by a technically minded person with humanist attention.

  Hard constraints: no people, no hands, no screens, no servers, no robots, no cyberpunk, no futuristic interface, no title text, no letters, no numbers, no logos, no watermark, no decorative grid overlay. Exactly one visual exception and less than 10% steel blue. Keep all meaningful elements inside a 6% safe margin so the image can be cropped responsively.
