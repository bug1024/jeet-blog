prompt: |
  Create a 4:3 horizontal constructed editorial still-life for the BUG1024 “The 1024th Cell” visual series. Theme: an old system may look irrational until the historical constraint that shaped it becomes visible.

  Scene: a modest old wooden workbench viewed straight on in a quiet workshop. Three of its four legs descend in a clean, expected alignment. Beneath the remaining expected leg position, an immovable worn stone footing rises from the old floor, making a normal vertical leg impossible. The bench surface remains level and visibly in use.

  Introduce exactly one Offset: the fourth wooden leg stands several centimeters to the side of its expected position to avoid that fixed stone. A single restrained steel-blue #365B6D load-transfer bracket connects the original corner of the bench to the offset leg, physically explaining how the unusual structure still carries weight. The offset leg and its bracket form the only deviation; no other repairs, cracks, or blue elements.

  Style and mood: credible constructed editorial still-life between real photography and a handmade structural model. Aged but cared-for wood, stone, old floor, brushed metal, subtle use marks, ordinary daylight. Calm, observant, and fair-minded, not nostalgic or picturesque. The first reading is “one leg looks wrong”; the second is “it is responding to a real constraint.”

  Hard constraints: no people, no tools scattered as decoration, no code, no servers, no gears, no blueprint overlay, no robots, no cyberpunk, no text, no letters, no numbers, no logo, no watermark. Exactly one offset and less than 10% steel blue. Keep all meaningful elements inside a 6% safe margin for responsive cropping.
