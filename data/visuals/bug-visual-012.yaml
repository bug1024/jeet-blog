prompt: |
  Create a 4:3 horizontal constructed editorial still-life for the BUG1024 “The 1024th Cell” visual series. Theme: a useful postmortem must reconstruct the information and constraints that existed at the time, rather than judge the past only from the known outcome.

  Scene: on an ink-dark planning table, five thin translucent glass plates form one orderly left-to-right sequence. Each plate normally rests level on two small neutral stone spacers, creating a consistent rhythm of layer, support, and next layer. The plates are blank, with no labels or diagrams.

  Introduce exactly one Missing element: beneath the middle glass plate, one expected stone spacer is absent, causing that plate and the later plates to lean subtly from that point. In the empty footprint, place a restrained steel-blue #365B6D wire outline shaped exactly like the missing spacer. It records where the absent condition belonged without pretending to be the original object. The missing support is the only Bug; the blue outline is its Trace. No other gaps, tilts, or blue elements.

  Style and mood: precise, quiet, reflective constructed editorial still-life, materially credible glass, stone, wire, and dark paper. Soft raking light reveals overlapping layers and the absent support. Observant and analytical, not forensic drama, not blame-oriented, not sentimental. The relationship must remain clear at thumbnail size.

  Hard constraints: no people, no meeting room, no evidence board, no arrows, no labels, no UI, no charts, no code, no servers, no robots, no cyberpunk, no text, no letters, no numbers, no logo, no watermark, no decorative grid overlay. Exactly one missing support and less than 10% steel blue. Keep all meaningful elements inside a 6% safe margin for responsive cropping.
