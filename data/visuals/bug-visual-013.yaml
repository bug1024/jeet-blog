prompt: |
  Create a 4:3 horizontal constructed editorial still-life for the BUG1024 “The 1024th Cell” visual series. Theme: doing more activities does not necessarily create more output; repeated easy actions can accumulate while the important progression barely moves.

  Scene: on a dark ink-colored craft table, a shallow linear making tray shows four physical stages of one small neutral plaster object: a rough blank, a partly shaped piece, a fitted piece, and a finished compact form. One object normally occupies each stage, creating a clear left-to-right natural progression. The stages have no labels or symbols.

  Introduce exactly one Duplicate Bug: at the second, partly shaped stage, six nearly identical pieces have been produced and form one compact crowded cluster, while the rest of the progression remains sparse and orderly. A single restrained steel-blue #365B6D guide gate physically releases only one piece from that cluster into the next stage, restoring movement toward completion. The duplicated cluster is the only anomaly; no overflow beyond the tray and no other blue elements.

  Style and mood: tactile constructed editorial still-life between photography and a handmade design model. Plaster dust, shallow grooves, worn tray edges, brushed metal, subtle evidence of repeated work. Calm, unsentimental, and precise; not a factory scene, not a productivity advertisement. The difference between activity volume and completed progression must read at thumbnail size.

  Hard constraints: no check marks, no to-do list, no arrows, no conveyor belt, no people, no clock, no screens, no charts, no code, no robots, no cyberpunk, no text, no letters, no numbers, no logo, no watermark, no decorative grid overlay. Exactly one duplicate cluster and less than 10% steel blue. Keep all meaningful elements inside a 6% safe margin for responsive cropping.
