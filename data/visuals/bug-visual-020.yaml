prompt: |
  Use case: stylized-concept
  Asset type: BUG1024 article cover, 4:3 landscape
  Article premise: A legacy monitoring system was migrated through temporary server-side dual writing, comparison, batching, and sharding because many clients could not upgrade together.
  Natural order: A single worn channel carries a sequence of identical small stone data pieces through an established wooden structure.
  Single Bug: fork — at one transition point the channel splits once into an old worn path and a new cleaner parallel path, creating a temporary double route.
  Steel-blue role: patch — one restrained steel-blue #365B6D switch-and-sync joint controls the single fork and keeps corresponding pieces aligned across both paths before they reconnect.
  Primary request: A constructed editorial still-life of two parallel tactile channels built from old wood, stone, paper composite and brushed metal. The scene begins as one established path, forks once through a steel-blue synchronization joint into old and new paths, then continues in parallel toward the edge of the model. Matching neutral pieces remain visibly aligned across both routes. The fork is the only deviation; no broken track or missing piece.
  Style/medium: tactile constructed editorial still-life, believable migration model with signs of use, between real photography and handmade engineering model.
  Composition/framing: clear left-to-right transition with one focal switch joint, balanced 4:3 landscape, thumbnail-readable, safe margins.
  Lighting/mood: quiet practical workshop light, patient and controlled, not heroic.
  Color palette: ink #111A21, mist white #F8FAF9, weathered wood and stone; steel blue under 10%, only the switch-and-sync joint.
  Constraints: no text, letters, numbers, labels, arrows, logo, title, watermark; exactly one fork; no trains, vehicles, server racks, decorative blue or grid overlay.
  Avoid: railway cliché, before-and-after split screen, data streams, cloud icons, cyberpunk, neon, holograms, robots, glossy corporate 3D, cinematic spectacle.
