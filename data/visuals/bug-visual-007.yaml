prompt: |
  Create a 4:3 horizontal editorial model photograph for the BUG1024 “The 1024th Cell” visual series. Theme: after becoming a team lead, the real task is not to carry everything personally but to build a structure in which responsibility and information are shared.

  Scene: a small handcrafted wooden load-bearing model on a dark ink-colored worktable. A long neutral horizontal beam is supported by four evenly spaced wooden uprights, establishing a clear natural order of distributed support. Several small neutral task blocks sit on the beam. The model should feel practical and architectural, with subtle fingerprints and wear.

  Introduce exactly one deliberate deviation: all task blocks have accumulated into one compact cluster directly above the central upright, making that single upright visibly bow under the concentrated load while the rest of the structure remains orderly. Add one restrained steel-blue #365B6D cross-brace that physically connects the bowed central upright to its neighboring supports and redistributes the load across the structure. The concentrated cluster and its stressed central support are one visual Bug; the blue brace is the functional Patch. No other blue elements and no broken pieces.

  Visual mood: calm, responsible, technically precise, human, and understated; editorial photography fused with subtle crafted illustration, like an architectural model in a Japanese design magazine. Warm off-white wood against dark ink, soft directional light, material texture, purposeful negative space. Do not make it heroic or corporate.

  Hard constraints: no people, no hands, no org charts, no arrows, no labels, no screens, no servers, no robots, no cyberpunk, no title text, no letters, no numbers, no logos, no watermark, no decorative grid overlay. Exactly one visual exception and less than 10% steel blue. Keep all meaningful elements inside a 6% safe margin for responsive cropping.
